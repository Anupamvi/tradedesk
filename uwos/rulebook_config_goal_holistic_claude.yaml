# rulebook_config_goal_holistic_claude.yaml
# Goal-focused configuration: prioritize consistency/quality over raw count,
# while still allowing executable candidates.
#
# CHANGES vs rulebook_config_goal_holistic.yaml (targeting PF > 1.15):
#
# [T1] gates.max_leg_spread_pct:          0.18  → 0.12   (tighter liquidity; reduces fill slippage)
# [T1] gates.min_leg_volume:              20    → 40     (better fill quality)
# [T1] strategy_selection.fire_enforce_max_iv_rank: false → true  (don't overpay for debit in high-IV)
# [T1] approval.min_credit_no_touch_pct:  60.0  → 65.0   (raise Shield win-rate floor)
# [T1] playbook.stop_loss_pct_debit_max_loss:  0.55 → 0.45  (cap debit avg loss earlier)
# [T1] playbook.stop_loss_pct_debit_near_dte: 0.45 → 0.40
# [T1] playbook.stop_loss_pct_debit_mid_dte:  0.55 → 0.45
#
# [T2] approval.tactical_min_edge_pct:    5.0   → 6.5    (half-size trades need better edge)
# [T2] approval.tactical_min_signals:     120   → 150    (more historical validation for tactical)
# [T2] approval.max_spot_asof_drift_pct:  0.35  → 0.20   (prevent stale approvals)
# [T2] shield.credit_short_otm_pct:       0.10  → 0.12   (more conservative short strikes)
#
# [T3] playbook.take_profit_pct_credit_max_profit: 0.60 → 0.50  (lock in credits at 50%; reduces gamma reversal risk)
# [T3] strategy_selection.breakout_max_debit_pct_width: 0.50 → 0.40  (tighter LIC cost control)
# [T3] approval.shield_live_valid_min_no_touch_floor: 50.0  (new — floor even for live-valid override)
# [T3] approval.shield_live_valid_min_edge_floor: 4.0       (new — minimum edge even for live-valid)
#
# [T4] shield.sigma_relaxation_factor: 0.45  (new — use 0.45x sigma instead of 1.0x for credit spreads)
# [T4] shield.iron_condor_sigma_factor: 0.40 (new — IC gets relaxed sigma since both sides must pass)
# [T4] engine.min_shield_in_output: 3        (new — reserve 3 output slots for SHIELD track)
# [T4] playbook.risk_limits.max_sector_share: 0.30  (new — no more than 30% of trades in one sector)
#
# [T5] engine.min_shield_in_output: 3 → 5    (reserve 5 slots for best positive-edge SHIELD trades)
# [T5] approval.min_credit_no_touch_pct: 65 → 25  (realistic for current vol; edge gate still protects PF)
# [T5] approval.ic_exempt_from_no_touch: true (IC profitability is terminal, no-touch is path-based)
#
# [T6] Pipeline audit fixes (backtest showed 17.5% win rate, -$3,301 P&L over 3 weeks):
# [T6] fire.debit_long_max_abs_moneyness_pct: 0.08 → 0.06  (strikes closer to ATM)
# [T6] fire.max_breakeven_dist_pct: 0.12 → 0.08            (reachable breakevens)
# [T6] fire.allow_both_sides_when_neutral: false → true     (unblock bear trades)
# [T6] shield.allow_both_sides_when_neutral: false → true   (same)
# [T6] approval.max_spot_asof_drift_pct: 0.20 → 0.50       (less restrictive drift)
# [T6] approval.entry_tolerance_floor: 0.25 → 0.15         (tighter for small spreads)

engine:
  max_tickers_to_scan: 450
  max_trades_per_ticker: 4
  max_trades_per_ticker_per_track: 3
  max_total_trades: 250
  max_expiries_per_ticker: 8
  strike_search_depth: 12
  discovery_multiplier: 6
  final_max_trades_per_ticker: 3
  min_per_track: 1
  min_shield_in_output: 5              # [T5] was: 3 — reserve 5 output slots for best SHIELD trades
  include_watch_candidates: true

gates:
  exclude_etfs: true
  min_credit_pct_width: 0.30
  max_credit_pct_width: 0.55
  max_debit_pct_width: 0.45           # [T6] was: 0.35 — ATM strikes cost more; 35% was rejecting valid near-ATM setups
  min_leg_open_interest: 100
  min_leg_volume: 40                  # [T1] was: 20 — better fill quality
  max_leg_spread_pct: 0.12            # [T1] was: 0.18 — reduce bid-ask slippage impact
  max_strike_distance_pct: 0.80
  max_risk_per_trade: 700
  min_debit_reward_risk: 1.20
  min_credit_reward_risk: 0.35

  width_tiers:
    - {min_price: 0,   max_price: 25,  min_width: 2.5, max_width: 5,   default_width: 2.5}
    - {min_price: 25,  max_price: 75,  min_width: 2.5, max_width: 7.5, default_width: 5}
    - {min_price: 75,  max_price: 150, min_width: 5,   max_width: 15,  default_width: 10}
    - {min_price: 150, max_price: 1.0e9, min_width: 10, max_width: 20, default_width: 10}

fire:
  dte_range: [21, 70]
  target_dte: 45
  debit_long_itm_pct: 0.03
  debit_long_otm_pct: 0.08
  debit_long_max_abs_moneyness_pct: 0.06  # [T6] was: 0.08 — tighter OTM cap; backtest showed 17.5% win rate with 0.08
  debit_use_dual_long_targets: true
  call_pool_min_pct: 0.75
  call_pool_max_pct: 1.15
  put_pool_min_pct: 0.85
  put_pool_max_pct: 1.30
  max_breakeven_dist_pct: 0.08            # [T6] was: 0.12 — tighter BE distance; 12% was unreachable for most 30-DTE trades
  invalidation_buffer_pct: 0.03
  allow_both_sides_when_neutral: true      # [T6] was: false — allow both bull+bear in neutral zone; prevents META-like blind spots
  lotto_dte_max: 10

shield:
  dte_range: [28, 56]
  target_dte: 42
  credit_short_otm_pct: 0.18         # [T7] was: 0.12 — targets 0.20-0.30 delta short (professional standard); 0.12 gave 0.40-0.50
  sigma_relaxation_factor: 0.45       # [T4] new — use 0.45x sigma; allows ~8-10% OTM strikes to pass
  iron_condor_sigma_factor: 0.40      # [T4] new — IC needs both sides; more relaxed to allow any through
  allow_both_sides_when_neutral: true      # [T6] was: false — same as FIRE; neutral tickers can generate both tracks
  min_marketcap: 10000000000
  lotto_dte_max: 7

strategy_selection:
  # Debit trades tend to perform better when IV is not elevated.
  fire_max_iv_rank: 55
  fire_enforce_max_iv_rank: true      # [T1] was: false — enforce so debit spreads skip high-IV regimes
  # Premium selling benefits from richer IV regimes.
  shield_min_iv_rank: 20
  # Range/theta structures need richer IV + neutral tape.
  range_min_iv_rank: 35
  range_min_neutrality: 0.72
  enable_iron_butterfly: true
  # Volatility breakout structure (defined-risk debit).
  enable_long_iron_condor: true
  breakout_min_implied_move_pct: 0.03
  breakout_min_neutrality: 0.20
  breakout_max_center_width_pct: 0.35
  breakout_max_debit_pct_width: 0.40  # [T3] was: 0.50 — tighter cost control on LIC structures

pricing:
  executable_source_kinds: ["hot"]

approval:
  require_likelihood_pass: true
  # If SHIELD/credit setup is live-valid (ok_live), do not hard-reject on
  # historical quality gates; keep those as informational in notes.
  shield_live_valid_overrides_quality: true
  shield_live_valid_min_no_touch_floor: 50.0  # [T3] new — floor even for live-valid override path
  shield_live_valid_min_edge_floor: 4.0        # [T3] new — minimum edge even for live-valid override
  min_edge_pct: 8.0
  min_signals: 120
  min_credit_no_touch_pct: 25.0       # [T5] was: 65.0 — lowered; realistic for current vol. Edge gate still protects PF.
  credit_no_touch_require_data: true
  ic_exempt_from_no_touch: true       # [T5] new — IC profitability is terminal (expiry-zone), no-touch is path-based
  min_likelihood_strength: Moderate
  disallow_likelihood_strengths: [Low Sample, Negative, Negative-Strong, N/A]

  allow_stage1_watch_promotion: true
  stage1_watch_promotion_min_conviction: 60
  stage1_watch_promotion_min_edge_pct: 8.0
  stage1_watch_promotion_min_signals: 200
  # Dual-book approvals:
  # Core = full size, Tactical = reduced size when only quality blockers fail.
  enable_dual_books: true
  core_size_mult: 1.00
  tactical_size_mult: 0.50
  tactical_min_conviction: 60
  tactical_min_edge_pct: 6.5          # [T2] was: 5.0 — half-size trades must clear higher edge bar
  tactical_min_signals: 150           # [T2] was: 120 — more historical validation required for tactical
  tactical_require_verdict_pass: true

  # Width-based entry gate tolerance (professional swing-trade standard).
  # Formula: tolerance = max(entry_tolerance_floor, spread_width × entry_tolerance_width_pct)
  # For a $15 spread at 2.5%: max(0.25, 15*0.025) = max(0.25, 0.375) = $0.375
  entry_tolerance_width_pct: 0.05    # [T6] was: 0.025 — widened to 5% to handle ATM strike premium drift
  entry_tolerance_floor: 0.30        # [T6] was: 0.25 — slight increase; ATM strikes have larger bid-ask
  require_spot_alignment: true
  spot_alignment_require_live: true
  max_spot_asof_drift_pct: 0.50       # [T6] was: 0.20 — too tight, rejecting valid trades on minor drift
  max_bull_call_long_otm_pct: 0.08
  max_bear_put_long_otm_pct: 0.08
  exclude_debit_moneyness_fail_from_output: true

  require_invalidation_clear: true
  block_invalidation_warning: false
  invalidation_eval_mode: auto
  invalidation_close_confirmations: 2
  enable_restrike_optimizer: true

  # Guard against low-quality SHIELD approvals.
  require_shield_sigma_pass: true
  shield_sigma_require_data: true
  require_shield_core: false
  require_live_shield_short_delta: true
  max_abs_short_delta_shield: 0.20       # static fallback (used when shield_delta_dynamic: false)
  shield_delta_dynamic: true             # dynamic cap: IVR/DTE/VIX/GEX-aware (professional practice)
  # FIRE delta gate: reject lottery tickets with low directional exposure
  require_fire_long_delta: true
  min_abs_long_delta_fire: 0.15
  # GEX regime gate: block regime-mismatched trades
  require_gex_regime: true

  # Keep very speculative structures out of approved set.
  disallow_confidence_tiers: [REJECT, LOTTO]

  enforce_pretrade_portfolio_caps: false
  pretrade_caps_require_data: false

high_beta:
  tickers: [TSLA, NVDA, MU, PLTR]
  min_dte: 28
  min_otm_pct: 0.10
  iv30d_override_threshold: 0.90
  require_short_delta_for_core: true

playbook:
  daily:
    daily_loss_stop_cash: 1000
    loss_streak_yellow: 3
    loss_streak_red: 4
    rolling_pf_yellow_floor: 1.00
    options_only: true
  position_management:
    take_profit_pct_of_max_profit: 0.60
    take_profit_pct_credit_max_profit: 0.50  # [T3] was: 0.60 — lock in at 50%; reduces late-theta gamma risk
    take_profit_pct_debit_cost: 0.80
    stop_loss_pct_of_risk: 0.50
    stop_loss_pct_credit_max_loss: 0.50
    stop_loss_pct_debit_max_loss: 0.45       # [T1] was: 0.55 — smaller avg loss improves PF denominator
    stop_loss_pct_debit_near_dte: 0.40       # [T1] was: 0.45
    stop_loss_pct_debit_mid_dte: 0.45        # [T1] was: 0.55
    stop_loss_pct_debit_far_dte: 0.65
    stop_loss_pct_debit_mid_min_dte: 21
    stop_loss_pct_debit_far_min_dte: 45
    leaps_dte_threshold: 120
    leaps_debit_catastrophic_stop_pct: 0.75
    short_roll_min_dte: 7
    short_roll_max_dte: 35
    short_roll_dte_threshold: 28
    long_option_exit_dte_threshold: 14
    near_expiry_dte_threshold: 5
    roll_risk_draw_trigger: 0.12
    roll_use_live_chain: true
    roll_chain_strike_count: 20
    roll_extend_min_days: 14
    roll_extend_max_days: 35
    roll_target_otm_pct: 0.08
  risk_limits:
    short_put_max_share: 0.25
    single_symbol_max_share: 0.08
    single_expiry_max_share_short_put: 0.20
    max_sector_share: 0.30             # [T4] new — no more than 30% of approved trades in one sector
  weekly:
    strategy_window_trades: 20
    strategy_min_trades: 20
    strategy_min_pf: 1.00
    symbol_window_trades: 20
    symbol_min_trades: 5
    symbol_pause_if_net_below: 0
    combo_min_trades: 3
    combo_pause_if_net_below: -1000
  monthly:
    target_monthly_profit: 20000
    long_call_monthly_kill_switch: -1500
