# rulebook_config.yaml
# Deterministic gates + scan parameters for uwos.strategy_engine

engine:
  max_tickers_to_scan: 400            # scan fewer symbols for higher signal concentration
  max_trades_per_ticker: 2            # allow top two setups per ticker before final approval
  max_trades_per_ticker_per_track: 1  # keep ticker diversity across FIRE/SHIELD
  max_total_trades: 200               # scanner cap (final output may cap lower)
  max_expiries_per_ticker: 8          # broader expiry coverage for robust candidate discovery
  strike_search_depth: 12             # broader strike sweep before final pruning
  discovery_multiplier: 5             # build wider candidate pool before final top-N cutoff
  final_max_trades_per_ticker: 2      # final table cap to keep diversity without forcing single pick
  min_per_track: 1                    # include both tracks when viable
  include_watch_candidates: true      # keep non-REJECT setups so FIRE/SHIELD gaps are visible

gates:
  exclude_etfs: true
  min_credit_pct_width: 0.30          # consistency mode: target better credit quality
  max_credit_pct_width: 0.55          # block high-risk near-ATM credits
  max_debit_pct_width: 0.38           # tighter debit risk
  min_leg_open_interest: 100          # allow valid mid-liquidity names (e.g. GLW-like chains)
  min_leg_volume: 20                  # relaxed per-leg same-day activity floor
  max_leg_spread_pct: 0.18            # reject wide/sloppy leg quotes
  max_strike_distance_pct: 0.80       # drop setups with strikes too far from spot (>80%)
  max_risk_per_trade: 700             # cap defined risk per trade in dollars
  min_debit_reward_risk: 1.20         # (max profit / max loss) floor for debit spreads
  min_credit_reward_risk: 0.35        # (max profit / max loss) floor for credit spreads

  # Consistency width tiers by underlying price (narrower than baseline rulebook)
  width_tiers:
    - {min_price: 0,   max_price: 25,  min_width: 2.5, max_width: 5,   default_width: 2.5}
    - {min_price: 25,  max_price: 75,  min_width: 2.5, max_width: 7.5, default_width: 5}
    - {min_price: 75,  max_price: 150, min_width: 5,   max_width: 15,  default_width: 10}
    - {min_price: 150, max_price: 1.0e9, min_width: 10, max_width: 20, default_width: 10}

shield:
  # SHIELD is "income / mean reversion"
  dte_range: [28, 56]
  target_dte: 42
  credit_short_otm_pct: 0.10          # farther OTM cushion for consistency
  allow_both_sides_when_neutral: false
  min_marketcap: 10000000000          # data-driven liquidity/quality floor (10B)
  lotto_dte_max: 7

fire:
  # FIRE is "momentum / directional"
  dte_range: [21, 70]
  target_dte: 45
  debit_long_itm_pct: 0.03            # slightly deeper ITM bias for delta support
  debit_long_otm_pct: 0.08            # also evaluate OTM long-leg debit structures (breakout style)
  debit_use_dual_long_targets: true   # evaluate ITM and OTM long targets, then keep best
  call_pool_min_pct: 0.75             # widen bullish strike search to include valid OTM breakouts
  call_pool_max_pct: 1.30
  put_pool_min_pct: 0.75
  put_pool_max_pct: 1.30
  allow_both_sides_when_neutral: false
  lotto_dte_max: 10

pricing:
  # Rulebook Stage-2 executable sources only (chain-oi is discovery-only)
  executable_source_kinds: ["hot"]

approval:
  # Final approval gate after Stage-2 + backtest likelihood merge.
  require_likelihood_pass: true
  min_edge_pct: 5.0
  min_signals: 120
  # Promote Stage-1 Watch rows when live + likelihood quality is still strong.
  allow_stage1_watch_promotion: true
  stage1_watch_promotion_min_conviction: 58
  stage1_watch_promotion_min_edge_pct: 4.0
  stage1_watch_promotion_min_signals: 120
  enable_dual_books: true
  core_size_mult: 1.00
  tactical_size_mult: 0.50
  tactical_min_conviction: 58
  tactical_min_edge_pct: 4.0
  tactical_min_signals: 120
  tactical_require_verdict_pass: true
  # Near-miss entry tolerance: treat small misses as executable.
  entry_tolerance_debit_abs: 0.15
  entry_tolerance_credit_abs: 0.15
  entry_tolerance_pct: 0.08
  require_invalidation_clear: false
  # Exit management: spot invalidation flags are warnings unless close-confirmed.
  invalidation_close_confirmations: 2
  # Enforce portfolio concentration caps before approving new entries.
  enforce_pretrade_portfolio_caps: false
  pretrade_caps_require_data: false

high_beta:
  # Rulebook hard override for Core Income credit trades
  tickers: [TSLA, NVDA, MU, PLTR]
  min_dte: 28
  min_otm_pct: 0.10
  iv30d_override_threshold: 0.90
  require_short_delta_for_core: true

playbook:
  # Portfolio process controls (daily/weekly/monthly)
  daily:
    daily_loss_stop_cash: 1000
    loss_streak_yellow: 3
    loss_streak_red: 4
    rolling_pf_yellow_floor: 1.00
    options_only: true
  position_management:
    # Profit capture thresholds
    take_profit_pct_of_max_profit: 0.60
    take_profit_pct_credit_max_profit: 0.60
    take_profit_pct_debit_cost: 0.80
    # Loss thresholds
    stop_loss_pct_of_risk: 0.50
    stop_loss_pct_credit_max_loss: 0.50
    stop_loss_pct_debit_max_loss: 0.55
    stop_loss_pct_debit_near_dte: 0.45
    stop_loss_pct_debit_mid_dte: 0.55
    stop_loss_pct_debit_far_dte: 0.65
    stop_loss_pct_debit_mid_min_dte: 21
    stop_loss_pct_debit_far_min_dte: 45
    leaps_dte_threshold: 120
    leaps_debit_catastrophic_stop_pct: 0.75
    # Roll/expiry controls
    short_roll_min_dte: 7
    short_roll_max_dte: 35
    short_roll_dte_threshold: 28
    long_option_exit_dte_threshold: 14
    near_expiry_dte_threshold: 5
    roll_risk_draw_trigger: 0.12
    roll_use_live_chain: true
    roll_chain_strike_count: 20
    roll_extend_min_days: 14
    roll_extend_max_days: 35
    roll_target_otm_pct: 0.08
  risk_limits:
    short_put_max_share: 0.25
    single_symbol_max_share: 0.08
    single_expiry_max_share_short_put: 0.20
  weekly:
    strategy_window_trades: 20
    strategy_min_trades: 20
    strategy_min_pf: 1.00
    symbol_window_trades: 20
    symbol_min_trades: 5
    symbol_pause_if_net_below: 0
    combo_min_trades: 3
    combo_pause_if_net_below: -1000
  monthly:
    target_monthly_profit: 20000
    long_call_monthly_kill_switch: -1500

